<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#edefea">
<meta name="description" content="Wyszukiwarka leków homeopatycznych oparta na Repertorium Kenta — kreator dolegliwości oraz pełne repertorium z wyszukiwarką rubryk i repertoryzacją.">
<title>Repertorium · leki homeopatyczne</title>
<style>
  :root{
    --bg:#edefea; --canvas:#dfe2da; --card:#ffffff;
    --label:#1c1c1e; --label2:#6b6b73; --label3:#a3a3ab;
    --sep:rgba(60,60,67,.10); --sep2:rgba(60,60,67,.18);
    --accent:#1f8a60; --accent-press:#176f4d; --accent-tint:rgba(31,138,96,.12);
    --g3:#1f8a60; --g2:#5fae8b; --g1:#a9cdba;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(20,40,30,.06);
    --radius:18px; --safe-b:env(safe-area-inset-bottom,0px);
    --ff:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:var(--ff);background:var(--canvas);color:var(--label);-webkit-font-smoothing:antialiased;line-height:1.42;font-size:17px}
  #app{max-width:480px;margin:0 auto;min-height:100dvh;min-height:100vh;background:var(--bg);position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.10)}
  @media (max-width:520px){ #app{box-shadow:none} body{background:var(--bg)} }

  .nav{position:sticky;top:0;z-index:30;height:52px;display:flex;align-items:center;padding:0 8px;background:rgba(237,239,234,.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid var(--sep)}
  .nav .title{flex:1;text-align:center;font-size:17px;font-weight:600;letter-spacing:.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px}
  .nav button{border:0;background:none;color:var(--accent);font-family:var(--ff);font-size:17px;padding:8px 10px;min-width:60px;cursor:pointer;display:flex;align-items:center;gap:2px}
  .nav button:active{opacity:.5}
  .nav .right{justify-content:flex-end}
  .nav .icnbtn{min-width:44px;justify-content:center}
  .chev-l{width:11px;height:18px}

  .screen{padding:0 16px calc(28px + var(--safe-b));animation:fade .26s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){ .screen{animation:none} *{transition:none!important} }

  .hero{padding:6px 4px 8px}
  .hero h1{font-size:34px;line-height:1.1;font-weight:700;letter-spacing:-.5px;margin:8px 0 6px}
  .hero p{margin:0;color:var(--label2);font-size:15px}

  /* segmented control */
  .seg{display:flex;background:rgba(118,118,128,.12);border-radius:11px;padding:2px;margin:16px 0 4px}
  .seg button{flex:1;border:0;background:none;font-family:var(--ff);font-size:14px;font-weight:600;color:var(--label);padding:8px;border-radius:9px;cursor:pointer;transition:.18s}
  .seg button.on{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.12)}

  .search{position:relative;margin:14px 0 8px}
  .search input{width:100%;border:0;background:rgba(118,118,128,.12);border-radius:12px;padding:11px 12px 11px 38px;font-size:17px;font-family:var(--ff);color:var(--label)}
  .search input::placeholder{color:#8a8a90}
  .search input:focus{outline:2px solid var(--accent-tint)}
  .search>svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:#8a8a90}

  .grouphdr{font-size:13px;font-weight:600;color:var(--label2);text-transform:uppercase;letter-spacing:.4px;margin:18px 4px 8px;display:flex;align-items:center;justify-content:space-between}
  .grouphdr .more{color:var(--accent);text-transform:none;letter-spacing:0;font-weight:500;cursor:pointer}

  .list{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .row{display:flex;align-items:center;gap:13px;padding:12px 14px;cursor:pointer;border-bottom:.5px solid var(--sep);transition:background .15s}
  .row:last-child{border-bottom:0}
  .row:active{background:rgba(60,60,67,.07)}
  .row .ico{width:34px;height:34px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--accent-tint);color:var(--accent)}
  .row .ico svg{width:20px;height:20px}
  .row .tx{flex:1;min-width:0}
  .row .tx b{font-weight:500;font-size:17px;display:block}
  .row .tx span{font-size:13px;color:var(--label3);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .cnt{font-size:13px;color:var(--label3);flex:none}
  .row .chev{width:8px;height:14px;color:var(--label3);flex:none}
  .empty{color:var(--label3);text-align:center;padding:34px 10px;font-size:15px}

  /* rubric rows (full repertory) */
  .rrow{display:flex;align-items:flex-start;gap:11px;padding:11px 14px;cursor:pointer;border-bottom:.5px solid var(--sep)}
  .rrow:last-child{border-bottom:0}
  .rrow:active{background:rgba(60,60,67,.06)}
  .rrow .add{width:24px;height:24px;border-radius:50%;border:2px solid var(--sep2);flex:none;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:.15s}
  .rrow .add svg{width:13px;height:13px;color:#fff;opacity:0;transform:scale(.5);transition:.15s}
  .rrow.on .add{background:var(--accent);border-color:var(--accent)}
  .rrow.on .add svg{opacity:1;transform:none}
  .rrow .rt{flex:1;min-width:0}
  .rrow .rt b{font-weight:500;font-size:15.5px;line-height:1.3;display:block}
  .rrow .rt span{font-size:12px;color:var(--label3)}
  .rrow .rn{font-size:12px;color:var(--label3);flex:none;margin-top:2px}

  /* questions / wizard */
  .prog-wrap{padding:14px 2px 4px}
  .prog{height:5px;border-radius:3px;background:rgba(60,60,67,.12);overflow:hidden}
  .prog>i{display:block;height:100%;background:var(--accent);border-radius:3px;transition:width .35s cubic-bezier(.4,0,.2,1)}
  .prog-lbl{font-size:13px;color:var(--label3);margin:8px 2px 0}
  .q-eyebrow{font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.3px;margin:22px 2px 6px;text-transform:uppercase}
  .q-title{font-size:26px;font-weight:700;letter-spacing:-.3px;line-height:1.18;margin:0 2px 4px}
  .q-hint{font-size:14px;color:var(--label2);margin:4px 2px 0}
  .chips{display:flex;flex-direction:column;gap:10px;margin:20px 0 8px}
  .chip{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--card);border:1.5px solid transparent;border-radius:14px;padding:14px 15px;font-size:16px;font-family:var(--ff);color:var(--label);box-shadow:var(--shadow);cursor:pointer;transition:transform .08s,border-color .15s,background .15s}
  .chip:active{transform:scale(.985)}
  .chip .tick{width:23px;height:23px;border-radius:50%;border:2px solid var(--sep2);flex:none;display:flex;align-items:center;justify-content:center;transition:.15s}
  .chip .tick svg{width:13px;height:13px;color:#fff;opacity:0;transform:scale(.5);transition:.15s}
  .chip.on{border-color:var(--accent);background:var(--accent-tint)}
  .chip.on .tick{background:var(--accent);border-color:var(--accent)}
  .chip.on .tick svg{opacity:1;transform:none}

  .actions{position:sticky;bottom:0;left:0;right:0;margin:8px -16px 0;padding:12px 16px calc(14px + var(--safe-b));background:linear-gradient(to top,var(--bg) 70%,transparent);display:flex;gap:10px}
  .btn{flex:1;border:0;border-radius:14px;padding:15px;font-size:17px;font-weight:600;font-family:var(--ff);cursor:pointer;transition:transform .08s,opacity .15s}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:active{background:var(--accent-press)}
  .btn-primary:disabled{opacity:.4}
  .btn-ghost{background:rgba(118,118,128,.12);color:var(--accent);flex:0 0 auto;padding-left:22px;padding-right:22px}

  /* sticky case button */
  .casebar{position:sticky;bottom:0;margin:10px -16px 0;padding:10px 16px calc(14px + var(--safe-b));background:linear-gradient(to top,var(--bg) 72%,transparent)}
  .casebar button{width:100%;border:0;border-radius:14px;padding:15px;font-size:17px;font-weight:600;font-family:var(--ff);background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .casebar button:active{background:var(--accent-press)}
  .casebar .b{background:rgba(255,255,255,.25);border-radius:20px;padding:1px 9px;font-size:14px}

  /* results */
  .res-head{padding:8px 2px 2px}
  .res-head h2{font-size:24px;font-weight:700;letter-spacing:-.3px;margin:6px 0 2px}
  .res-head p{margin:0;color:var(--label2);font-size:14px}
  .sel-bar{margin:14px 0;background:var(--card);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .sel-bar .toggle{display:flex;align-items:center;gap:10px;padding:13px 15px;cursor:pointer;font-size:15px}
  .sel-bar .toggle b{font-weight:500}
  .sel-bar .toggle .cnt{margin-left:auto;color:var(--label3);font-size:14px}
  .sel-bar .body{display:none;padding:0 15px 12px;border-top:.5px solid var(--sep)}
  .sel-bar.open .body{display:block}
  .sel-item{font-size:14px;color:var(--label2);padding:8px 0;border-bottom:.5px solid var(--sep);display:flex;gap:8px}
  .sel-item:last-child{border:0}
  .sel-item em{color:var(--label3);font-style:normal;margin-left:auto;white-space:nowrap}
  .rmd{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:13px 14px;margin-bottom:11px;cursor:pointer;transition:transform .08s}
  .rmd:active{transform:scale(.99)}
  .rank{font-size:13px;font-weight:700;color:var(--label3);width:18px;text-align:center;flex:none}
  .ring{width:46px;height:46px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
  .ring::after{content:"";position:absolute;inset:5px;background:var(--card);border-radius:50%}
  .ring span{position:relative;z-index:1;font-size:13px;font-weight:700;color:var(--accent)}
  .rmd .info{flex:1;min-width:0}
  .rmd .info b{font-weight:600;font-size:17px}
  .rmd .info .lat{font-size:13px;color:var(--label3);font-style:italic}
  .rmd .info .meta{font-size:13px;color:var(--label2);margin-top:2px}
  .rmd .chev{width:8px;height:14px;color:var(--label3);flex:none}

  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.32);opacity:0;pointer-events:none;transition:opacity .3s;z-index:40}
  .backdrop.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;z-index:50;background:var(--bg);border-radius:22px 22px 0 0;padding:8px 18px calc(24px + var(--safe-b));transform:translateY(101%);transition:transform .34s cubic-bezier(.32,.72,0,1);max-height:88dvh;max-height:88vh;overflow:auto;box-shadow:0 -10px 40px rgba(0,0,0,.18)}
  .sheet.show{transform:none}
  .grab{width:38px;height:5px;border-radius:3px;background:var(--sep2);margin:6px auto 10px}
  .sheet h3{font-size:22px;font-weight:700;margin:6px 0 1px;letter-spacing:-.2px}
  .sheet .lat{color:var(--label3);font-style:italic;font-size:14px;margin-bottom:14px}
  .sheet .key{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:14px;font-size:15px;color:var(--label);margin-bottom:16px}
  .sheet .sub{font-size:13px;font-weight:600;color:var(--label2);text-transform:uppercase;letter-spacing:.4px;margin:0 2px 8px}
  .cov{background:var(--card);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .cov .ci{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:.5px solid var(--sep);font-size:15px}
  .cov .ci:last-child{border:0}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .cov .ci .gl{margin-left:auto;font-size:12px;color:var(--label3)}
  .sheet .close{width:100%;margin-top:18px;background:rgba(118,118,128,.12);color:var(--accent);border:0;border-radius:14px;padding:15px;font-size:17px;font-weight:600;font-family:var(--ff);cursor:pointer}
  .sheet .danger{color:#c0392b}

  .disc{font-size:14px;color:var(--label2);line-height:1.5}
  .disc strong{color:var(--label)}
  .disc .warn{background:#fff5ec;border:1px solid #ffd9b3;color:#8a4b00;border-radius:12px;padding:12px 14px;margin:10px 0;font-size:13.5px}

  .banner{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:11px 13px;font-size:13px;color:var(--label2);margin:6px 0 2px;display:flex;gap:9px;align-items:flex-start}
  .banner svg{flex:none;width:17px;height:17px;color:var(--accent);margin-top:1px}
  .banner.demo{background:#fff8ee}
  .banner.demo svg{color:#c08a2a}

  .foot{margin-top:24px;text-align:center;color:var(--label3);font-size:12px;line-height:1.5}
  .foot a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div id="app">
  <div class="nav" id="nav">
    <button id="navleft" class="left" style="visibility:hidden" aria-label="Wstecz">
      <svg class="chev-l" viewBox="0 0 11 18" fill="none"><path d="M9.5 1.5L2 9l7.5 7.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span id="navleftlbl">Wstecz</span>
    </button>
    <div class="title" id="navtitle">Repertorium</div>
    <button id="navright" class="right icnbtn" aria-label="Informacje" onclick="openDisclaimer()">
      <svg viewBox="0 0 22 22" width="22" height="22" fill="none"><circle cx="11" cy="11" r="9.2" stroke="currentColor" stroke-width="1.6"/><circle cx="11" cy="6.6" r="1.15" fill="currentColor"/><path d="M11 9.8v6.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div id="view"></div>
</div>

<div class="backdrop" id="backdrop" onclick="closeSheet()"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true"><div class="grab"></div><div id="sheetbody"></div></div>

<!-- Tu „polacz.py" wkleja pełne repertorium (wersja „wszystko w jednym pliku"). Puste = aplikacja użyje pliku zewnętrznego lub bazy demonstracyjnej. -->
<script id="kent-data" type="application/json"></script>

<script>
"use strict";

/* =====================================================================
   CZĘŚĆ 1 — KURATOROWANA BAZA „KREATORA” (jak poprzednio)
   ===================================================================== */
const REM = {
  Acon:["Aconitum napellus","Tojad mocny","Nagły, gwałtowny początek po zimnym suchym wietrze lub silnym przestrachu. Niepokój, lęk, pragnienie zimnej wody."],
  Apis:["Apis mellifica","Pszczoła miodna","Różowy, piekąco-kłujący obrzęk; lepiej od zimna, gorzej od ciepła. Zwykle bez pragnienia."],
  Arn:["Arnica montana","Arnika górska","Skutki urazów i stłuczeń; uczucie „posiniaczenia”. Nie chce być dotykany."],
  Ars:["Arsenicum album","Biały arszenik","Niepokój, lęk o zdrowie, osłabienie. Pieczenie łagodzone ciepłem; pragnienie częstych małych łyków; gorzej koło północy."],
  Bell:["Belladonna","Pokrzyk wilcza jagoda","Nagłe stany zapalne: gorąco, czerwień, pulsowanie, rozszerzone źrenice. Gorzej od światła, hałasu, wstrząsu."],
  Bry:["Bryonia alba","Przestęp biały","Gorzej od najmniejszego ruchu, lepiej w bezruchu i od ucisku. Suchość błon śluzowych, duże pragnienie, drażliwość."],
  Calc:["Calcarea carbonica","Węglan wapnia","Zmęczenie, poty głowy, wrażliwość na zimno i wilgoć. Powolność, obawy; pragnienie rzeczy niestrawnych."],
  "Carb-v":["Carbo vegetabilis","Węgiel drzewny","Wzdęcia, odbijanie, potrzeba świeżego powietrza i wachlowania. Osłabienie, ziębnięcie."],
  Cham:["Chamomilla","Rumianek pospolity","Nieznośna drażliwość z bólu; jeden policzek czerwony. Ząbkowanie; ulga, gdy noszony."],
  Cocc:["Cocculus indicus","Kulczyba","Nudności podróżne, zawroty od ruchu; wyczerpanie po nieprzespanych nocach."],
  Coff:["Coffea cruda","Surowa kawa","Bezsenność od natłoku myśli i podniecenia; nadwrażliwość, „wszystko za mocne”."],
  Coloc:["Colocynthis","Gorzki ogórek","Kolkowy, skurczowy ból brzucha; ulga od zgięcia wpół i mocnego ucisku. Złość z bólem."],
  Dros:["Drosera rotundifolia","Rosiczka","Napadowy, szczekający kaszel, gorszy w nocy i po położeniu się."],
  Euphr:["Euphrasia officinalis","Świetlik","Gryzące łzawienie z oczu, łagodny wyciek z nosa (odwrotnie niż Allium cepa)."],
  "Ferr-p":["Ferrum phosphoricum","Fosforan żelaza","Łagodny początek gorączki bez wyraźnych objawów; skłonność do krwawień, bladość z rumieńcem."],
  Gels:["Gelsemium sempervirens","Jaśmin karoliński","Osłabienie, ociężałość, drżenie, „grypowe” rozbicie. Brak pragnienia; trema z biegunką."],
  Hep:["Hepar sulphuris","Wątroba siarki","Skrajna wrażliwość na zimno, dotyk i ból. Skłonność do ropienia; drzazgowaty ból gardła."],
  Ign:["Ignatia amara","Bób św. Ignacego","Skutki świeżego żalu i przykrości; wzdychanie, zmienność, kula w gardle, objawy paradoksalne."],
  Ip:["Ipecacuanha","Wymiotnica","Uporczywe, nieustępujące nudności przy zaskakująco czystym języku."],
  Led:["Ledum palustre","Bagno zwyczajne","Rany kłute i ukłucia; obrzęk lepszy od zimnych okładów."],
  Lyc:["Lycopodium clavatum","Widłak goździsty","Wzdęcia i pełność, gorzej 16–20, częściej prawa strona. Brak pewności siebie przy zewnętrznej dominacji."],
  "Mag-phos":["Magnesia phosphorica","Fosforan magnezu","Kurczowe, strzelające bóle; wyraźna ulga od ciepła i ucisku."],
  Merc:["Mercurius solubilis","Rtęć rozpuszczalna","Ślinotok, poty bez ulgi, obłożony język. Gorzej w nocy i od ciepła łóżka."],
  "Nat-m":["Natrum muriaticum","Sól kuchenna","Skutki tłumionego żalu, zamknięcie w sobie, gorzej od pocieszania. Pragnienie soli, opryszczka."],
  "Nux-v":["Nux vomica","Orzech wymiotny","Drażliwość, nadwrażliwość, skutki przejedzenia i używek. Gorzej rano i od zimna; uczucie zalegania."],
  "Phos-ac":["Phosphoricum acidum","Kwas fosforowy","Apatia i otępienie po wyczerpaniu lub żalu; obojętność, osłabienie."],
  Phos:["Phosphorus","Fosfor","Pragnienie zimnych napojów, skłonność do krwawień, wrażliwość. Potrzeba towarzystwa; lepiej po krótkim śnie."],
  Podo:["Podophyllum peltatum","Stopowiec","Obfita, „chlustająca”, poranna biegunka z osłabieniem."],
  Puls:["Pulsatilla pratensis","Sasanka łąkowa","Zmienne, wędrujące objawy; płaczliwość, potrzeba pocieszania. Brak pragnienia; lepiej na świeżym powietrzu."],
  "Rhus-t":["Rhus toxicodendron","Sumak jadowity","Sztywność i ból gorsze przy pierwszym ruchu, lepsze od dalszego ruchu i ciepła. Niepokój, wymuszone zmiany pozycji."],
  Sep:["Sepia officinalis","Mątwa","Wyczerpanie, obojętność wobec bliskich, uczucie opadania narządów; lepiej od energicznego ruchu."],
  Sil:["Silicea terra","Krzemionka","Skłonność do ropienia i wydalania ciał obcych; wrażliwość na zimno, brak pewności, upór."],
  Spong:["Spongia tosta","Gąbka prażona","Suchy, szczekający kaszel — „piła w desce”; gorzej przed północą."],
  Sulph:["Sulphur","Siarka","Pieczenie i świąd gorsze od ciepła i mycia; gorąco stóp. Nawroty, „nieuporządkowany” obraz."],
  Verat:["Veratrum album","Ciemiernik biały","Biegunka z zimnym potem, bladością i skrajnym osłabieniem; ziębnięcie."],
  "All-c":["Allium cepa","Cebula","Wodnisty, gryzący wyciek z nosa i łagodne łzawienie; gorzej w ciepłym pokoju, lepiej na powietrzu."]

function plSegment(seg){
  let s = (seg||"").trim();
  if(!s) return s;
  s = s.replace(/\(agg\.?\)/ig,'(pog.)').replace(/\(amel\.?\)/ig,'(popr.)')
       .replace(/\(see\s+([^)]+)\)/ig,(m,x)=>'(zob. '+x+')');
  const low = s.toLowerCase();
  if(PL_PHRASES[low]) return PL_PHRASES[low];
  return s.replace(/[A-Za-zÀ-ÿ][A-Za-zÀ-ÿ.'’-]*/g, w=>{
    const t = PL_WORDS[w.toLowerCase()];
    return (t!==undefined) ? t : w;
  });
}
function translateRubric(path){
  if(!path) return path;
  let r = path.split(', ').map(plSegment).join(', ');
  r = r.replace(/\s+/g,' ').replace(/\s+([,;:.])/g,'$1').replace(/,\s*,/g,',').replace(/^[\s,]+/,'').replace(/[\s,]+$/,'').trim();
  return r.charAt(0).toUpperCase() + r.slice(1);
}

let KENT = null;     // {chapters:[..], remedies:{key:name}, rubrics:[{id,ch,pl,path,pathPL,en,rem}], demo:bool}
let KENT_INDEX = []; // do wyszukiwania: {id, hay, ref}

function buildDemoKent(){
  const remedies = {};
  for (const k in REM) remedies[k.toLowerCase()] = REM[k][0];
  const chOf = id =>
    /^head/.test(id) ? "Head" :
    /^(fever|onset|after)/.test(id) ? "Fever" :
    /^cough/.test(id) ? "Cough" :
    /^throat/.test(id) ? "Throat" :
    /^(coryza|sneez)/.test(id) ? "Nose" :
    /^(stomach|nausea|overeat|bloating|cramp|worse_eating|better_eating)/.test(id) ? "Stomach" :
    /^diarr/.test(id) ? "Stool" :
    /^(sleep|sleepy)/.test(id) ? "Sleep" :
    /^(anx|mood|grief|worse_consol|better_consol)/.test(id) ? "Mind" :
    /^pain/.test(id) ? "Extremities" :
    /^skin/.test(id) ? "Skin" :
    /^menses/.test(id) ? "Genitalia female" :
    "Generalities";
  const rubrics = Object.entries(RUB).map(([id,r])=>{
    const rem = {}; for (const k in r[2]) rem[k.toLowerCase()] = r[2][k];
    return {ch:chOf(id), p:r[0], en:r[1], r:rem};
  });
  const order = [];
  rubrics.forEach(x=>{ if(!order.includes(x.ch)) order.push(x.ch); });
  return {chapters:order, remedies, rubrics, demo:true};
}

function normalizeKent(raw){
  // raw.rubrics items use short keys c/p/r (z buildera) lub ch/p/en/r (demo)
  const demo = !!raw.demo;
  const rubrics = raw.rubrics.map((x,i)=>{
    const path = x.p;
    return {
      id:"k"+i,
      ch:x.c || x.ch,
      pl:CH_PL[x.c || x.ch] || (x.c || x.ch),
      path,
      pathPL: demo ? path : translateRubric(path),   // demo ma już polskie etykiety
      en:x.en || "",
      rem:x.r
    };
  });
  KENT = {chapters:raw.chapters, remedies:raw.remedies, rubrics, demo:demo, meta:raw.meta};
  KENT_INDEX = rubrics.map(r=>({id:r.id, hay:(r.pathPL+" "+r.path+" "+(r.en||"")).toLowerCase(), ref:r}));
}

async function loadKent(){
  // 1) dane WBUDOWANE w ten plik (tryb „wszystko w jednym") — działa nawet po
  //    otwarciu pliku podwójnym kliknięciem, bez serwera.
  const tag=document.getElementById('kent-data');
  if(tag){
    const txt=tag.textContent.trim();
    if(txt.length>20){
      try{ const data=JSON.parse(txt); if(data&&data.rubrics&&data.rubrics.length){ normalizeKent(data); return; } }catch(e){}
    }
  }
  // 2) zewnętrzny plik kent-repertory.json obok index.html (serwer / GitHub Pages)
  try{
    const res = await fetch("kent-repertory.json", {cache:"no-store"});
    if(res.ok){
      const data = await res.json();
      if(data && data.rubrics && data.rubrics.length){ normalizeKent(data); return; }
    }
  }catch(e){/* brak pliku — użyj demo */}
  // 3) baza demonstracyjna
  normalizeKent(buildDemoKent());
}

function rubricsByChapter(ch){ return KENT.rubrics.filter(r=>r.ch===ch); }
function chapterCounts(){
  const m = {}; KENT.rubrics.forEach(r=>{ m[r.ch]=(m[r.ch]||0)+1; });
  return KENT.chapters.filter(c=>m[c]).map(c=>({ch:c, pl:CH_PL[c]||c, n:m[c]}));
}

/* unified remedy helpers (lowercase keys) */
function remName(k){ return (KENT && KENT.remedies[k]) || (REM_LOWER[k] && REM_LOWER[k].name) || (k.charAt(0).toUpperCase()+k.slice(1)); }
function remKeynote(k){ return REM_LOWER[k] ? REM_LOWER[k].key : ""; }

/* =====================================================================
   ENGINE: repertoryzacja na liście rubryk {label,en,rem:{key:grade}}
   ===================================================================== */
function repertorize(rubrics){
  const sc = {};
  rubrics.forEach(r=>{
    for(const rem in r.rem){
      if(!sc[rem]) sc[rem]={score:0,count:0};
      sc[rem].score += r.rem[rem]; sc[rem].count++;
    }
  });
  return Object.entries(sc).map(([rem,v])=>({rem,...v}))
    .sort((a,b)=> b.count-a.count || b.score-a.score || a.rem.localeCompare(b.rem));
}
function rgColor(g){ return g===3?'var(--g3)':g===2?'var(--g2)':'var(--g1)'; }

   STAN + persistencja koszyka
   ===================================================================== */
let state = {tab:'wizard', screen:'home', topic:null, idx:0, picks:{}, wquery:"", rquery:"", chapter:null, browseLimit:300, gchap:null, gmain:null, gmainPL:"", gmquery:"", gvLimit:400};
let caseSet = new Set();   // id rubryk Kenta w koszyku
let selOpen = false;

try{ const s=localStorage.getItem('kent_case'); if(s) caseSet=new Set(JSON.parse(s)); }catch(e){}
function persistCase(){ try{ localStorage.setItem('kent_case', JSON.stringify([...caseSet])); }catch(e){} }

/* =====================================================================
   ELEMENTY UI / NAWIGACJA
   ===================================================================== */
const view=document.getElementById('view');
const navleft=document.getElementById('navleft'), navleftlbl=document.getElementById('navleftlbl');
const navtitle=document.getElementById('navtitle'), navright=document.getElementById('navright');

function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function svg(name){return `<svg viewBox="0 0 24 24" fill="none">${ICON[name]}</svg>`;}
const chevR='<svg class="chev" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const tickSvg='<svg viewBox="0 0 14 14" fill="none"><path d="M2 7.5l3.2 3.2L12 3.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function setNav(){
  const s=state.screen;
  if(s==='home'){ navleft.style.visibility='hidden'; navtitle.textContent='Repertorium'; }
  else if(s==='wflow'){ navleft.style.visibility='visible'; navleftlbl.textContent='Wstecz'; navtitle.textContent=state.topic?state.topic.pl:''; }
  else if(s==='wresult'){ navleft.style.visibility='visible'; navleftlbl.textContent='Start'; navtitle.textContent='Dopasowanie'; }
  else if(s==='chapter'){ navleft.style.visibility='visible'; navleftlbl.textContent='Rozdziały'; navtitle.textContent=state.chapter?(CH_PL[state.chapter]||state.chapter):''; }
  else if(s==='rresult'){ navleft.style.visibility='visible'; navleftlbl.textContent='Repertorium'; navtitle.textContent='Analiza'; }
  else if(s==='gchap'){ navleft.style.visibility='visible'; navleftlbl.textContent='Kreator'; navtitle.textContent='Całe repertorium'; }
  else if(s==='gmain'){ navleft.style.visibility='visible'; navleftlbl.textContent='Obszary'; navtitle.textContent=state.gchap?(CH_PL[state.gchap]||state.gchap):''; }
  else if(s==='gvars'){ navleft.style.visibility='visible'; navleftlbl.textContent='Wstecz'; navtitle.textContent=state.gmainPL||''; }
}
navleft.onclick=()=>{
  const s=state.screen;
  if(s==='wflow'){ if(state.idx>0){state.idx--;render();} else goHome('wizard'); }
  else if(s==='wresult') goHome('wizard');
  else if(s==='chapter'){ state.screen='home'; state.chapter=null; render(); }
  else if(s==='rresult'){ state.screen='home'; render(); }
  else if(s==='gchap'){ goHome('wizard'); }
  else if(s==='gmain'){ state.screen='gchap'; state.gchap=null; render(); window.scrollTo(0,0); }
  else if(s==='gvars'){ state.screen='gmain'; render(); window.scrollTo(0,0); }
};
function goHome(tab){ state.screen='home'; if(tab)state.tab=tab; state.topic=null; state.idx=0; selOpen=false; render(); window.scrollTo(0,0); }

function render(){
  setNav();
  const s=state.screen;
  if(s==='home') renderHome();
  else if(s==='wflow') renderFlow();
  else if(s==='wresult') renderWizardResult();
  else if(s==='chapter') renderChapter();
  else if(s==='rresult') renderRepResult();
  else if(s==='gchap') renderGChap();
  else if(s==='gmain') renderGMain();
  else if(s==='gvars') renderGVars();
}

/* ---------- HOME ---------- */
function renderHome(){
  const seg=`<div class="seg">
    <button class="${state.tab==='wizard'?'on':''}" id="segW">Kreator</button>
    <button class="${state.tab==='rep'?'on':''}" id="segR">Repertorium</button></div>`;
  if(state.tab==='wizard') renderHomeWizard(seg);
  else renderHomeRep(seg);
  const segW=document.getElementById('segW'), segR=document.getElementById('segR');
  if(segW) segW.onclick=()=>{state.tab='wizard';render();window.scrollTo(0,0);};
  if(segR) segR.onclick=()=>{state.tab='rep';render();window.scrollTo(0,0);};
}

function renderHomeWizard(seg){
  const q=state.wquery.trim().toLowerCase();
  const list=q?TOPICS.filter(t=>t.pl.toLowerCase().includes(q)||t.kw.some(k=>k.includes(q))):TOPICS;
  const rows=list.map(t=>`<div class="row" role="button" tabindex="0" data-topic="${t.id}">
      <div class="ico">${svg(t.icon)}</div>
      <div class="tx"><b>${esc(t.pl)}</b><span>${esc(RUB[t.base][1])}</span></div>${chevR}</div>`).join('');
  view.innerHTML=`<div class="screen">
    <div class="hero"><h1>Repertorium</h1><p>Wpisz dolegliwość i odpowiedz na pytania — albo przejdź krok po kroku przez całą książkę.</p></div>
    ${seg}
    <div class="grouphdr">Całe repertorium</div>
    <div class="list" style="margin-bottom:2px"><div class="row" id="guidedStart" role="button" tabindex="0">
      <div class="ico">${svg('book')}</div>
      <div class="tx"><b>Przejdź przez całą książkę</b><span>Krok po kroku: obszar → objaw → analiza</span></div>${chevR}</div></div>
    <div class="grouphdr">Szybki start — częste dolegliwości</div>
    <div class="search"><svg viewBox="0 0 18 18" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.6"/><path d="M12.5 12.5L16 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input id="q" type="search" enterkeyhint="search" placeholder="Wpisz dolegliwość…" value="${esc(state.wquery)}" autocomplete="off" autocapitalize="off"></div>
    ${rows?`<div class="list">${rows}</div>`:`<div class="empty">Brak dopasowań dla „${esc(state.wquery)}”.</div>`}
    <div class="foot">Źródło: <a href="http://www.homeoint.org/books/kentrep/" target="_blank" rel="noopener">Repertorium Kenta</a> (1897, domena publiczna). <a href="#" onclick="openDisclaimer();return false">Zastrzeżenie</a>.</div>
  </div>`;
  const input=document.getElementById('q');
  input.addEventListener('input',e=>{state.wquery=e.target.value;renderHomeWizard(seg);bindSeg();caretEnd(document.getElementById('q'));});
  const gs=document.getElementById('guidedStart'); if(gs) gs.onclick=startGuided;
  bindTopics();
}
function bindTopics(){ view.querySelectorAll('[data-topic]').forEach(el=>{ el.onclick=()=>startTopic(el.dataset.topic); el.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();startTopic(el.dataset.topic);}}; }); }
function bindSeg(){ const w=document.getElementById('segW'),r=document.getElementById('segR'); if(w)w.onclick=()=>{state.tab='wizard';render();window.scrollTo(0,0);}; if(r)r.onclick=()=>{state.tab='rep';render();window.scrollTo(0,0);}; }
function caretEnd(el){ if(!el)return; el.focus(); const v=el.value; el.value=''; el.value=v; }

function renderHomeRep(seg){
  const q=state.rquery.trim().toLowerCase();
  let body='';
  if(q.length>=2){
    const out=[]; for(let i=0;i<KENT_INDEX.length && out.length<200;i++){ if(KENT_INDEX[i].hay.includes(q)) out.push(KENT_INDEX[i].ref); }
    body = out.length
      ? `<div class="grouphdr">Znalezione rubryki<span class="more">${out.length}${out.length===200?'+':''}</span></div><div class="list">${out.map(rubricRow).join('')}</div>`
      : `<div class="empty">Brak rubryk dla „${esc(state.rquery)}”.</div>`;
  } else {
    const chs=chapterCounts();
    body=`<div class="grouphdr">Rozdziały repertorium<span class="more">${KENT.rubrics.length} rubryk</span></div>
      <div class="list">${chs.map(c=>`<div class="row" role="button" tabindex="0" data-ch="${esc(c.ch)}">
        <div class="ico">${svg('book')}</div><div class="tx"><b>${esc(c.pl)}</b><span>${esc(c.ch)}</span></div>
        <span class="cnt">${c.n}</span>${chevR}</div>`).join('')}</div>`;
  }
  const banner = KENT.demo
    ? `<div class="banner demo"><svg viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="9.2" stroke="currentColor" stroke-width="1.6"/><circle cx="11" cy="6.6" r="1.15" fill="currentColor"/><path d="M11 9.8v6.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><div>Wersja demonstracyjna (${KENT.rubrics.length} rubryk). Uruchom <b>build_kent.py</b> i wgraj <b>kent-repertory.json</b>, aby załadować pełne repertorium.</div></div>`
    : `<div class="banner"><svg viewBox="0 0 22 22" fill="none"><path d="M5 11.5l4 4 8-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><div>Pełne repertorium załadowane — ${KENT.rubrics.length.toLocaleString('pl')} rubryk, ${Object.keys(KENT.remedies).length} leków.</div></div>`;

  view.innerHTML=`<div class="screen">
    <div class="hero"><h1>Repertorium</h1><p>Przeszukaj rubryki lub wejdź w rozdział. Dodaj objawy do koszyka, a następnie przeprowadź analizę.</p></div>
    ${seg}
    <div class="search"><svg viewBox="0 0 18 18" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.6"/><path d="M12.5 12.5L16 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input id="rq" type="search" enterkeyhint="search" placeholder="Szukaj rubryki (np. headache, anger, cough)…" value="${esc(state.rquery)}" autocomplete="off" autocapitalize="off"></div>
    ${banner}
    ${body}
    ${caseBar()}
    <div class="foot">Źródło: <a href="http://www.homeoint.org/books/kentrep/" target="_blank" rel="noopener">Repertorium Kenta</a>. <a href="#" onclick="openDisclaimer();return false">Zastrzeżenie</a>.</div>
  </div>`;
  const rq=document.getElementById('rq');
  rq.addEventListener('input',e=>{state.rquery=e.target.value; clearTimeout(rq._t); rq._t=setTimeout(()=>{renderHomeRep(seg);bindSeg();caretEnd(document.getElementById('rq'));},120);});
  bindRubricRows(); bindChapters(); bindCaseBar();
}
function bindChapters(){ view.querySelectorAll('[data-ch]').forEach(el=>{ el.onclick=()=>{state.chapter=el.dataset.ch;state.screen='chapter';state.browseLimit=300;render();window.scrollTo(0,0);}; }); }

function rubricRow(r){
  const on=caseSet.has(r.id);
  const n=Object.keys(r.rem).length;
  const sec = KENT.demo ? r.pl : (r.path!==r.pathPL ? r.path : r.pl);
  return `<div class="rrow ${on?'on':''}" role="button" tabindex="0" data-rub="${r.id}">
    <span class="add">${tickSvg}</span>
    <div class="rt"><b>${esc(r.pathPL)}</b><span>${esc(sec)}</span></div>
    <span class="rn">${n}</span></div>`;
}
function bindRubricRows(){
  view.querySelectorAll('[data-rub]').forEach(el=>{
    el.onclick=()=>{ const id=el.dataset.rub; if(caseSet.has(id))caseSet.delete(id); else caseSet.add(id); persistCase(); el.classList.toggle('on'); refreshCaseBar(); };
  });
}

function caseBar(){
  if(!caseSet.size) return '';
  return `<div class="casebar" id="casebar"><button id="caseBtn">Analizuj objawy <span class="b">${caseSet.size}</span></button></div>`;
}
function bindCaseBar(){ const b=document.getElementById('caseBtn'); if(b) b.onclick=openCase; }
function refreshCaseBar(){
  const ta=document.getElementById('toAnalyze');
  if(ta){ ta.textContent='Analizuj ('+caseSet.size+')'; ta.disabled=!caseSet.size; return; }
  let host=document.getElementById('casebar');
  if(caseSet.size && !host){ render(); return; }
  if(!caseSet.size && host){ host.remove(); return; }
  if(host){ const b=host.querySelector('.b'); if(b) b.textContent=caseSet.size; }
}

/* ---------- CHAPTER browse ---------- */
function renderChapter(){
  const all=rubricsByChapter(state.chapter);
  const shown=all.slice(0, state.browseLimit);
  const more = all.length>shown.length;
  view.innerHTML=`<div class="screen">
    <div class="grouphdr">${esc(CH_PL[state.chapter]||state.chapter)}<span class="more">${all.length} rubryk</span></div>
    <div class="list">${shown.map(rubricRow).join('')}</div>
    ${more?`<div class="grouphdr"><span></span><span class="more" id="moreBtn">Pokaż więcej (${all.length-shown.length})</span></div>`:''}
    ${caseBar()}
  </div>`;
  bindRubricRows(); bindCaseBar();
  const mb=document.getElementById('moreBtn'); if(mb) mb.onclick=()=>{state.browseLimit+=400;render();};
}

/* ---------- KREATOR: przewodnik przez całe repertorium ---------- */
function startGuided(){ state.screen='gchap'; state.gchap=null; state.gmain=null; state.gmquery=""; render(); window.scrollTo(0,0); }

function mainRubricsOf(ch){
  const map=new Map();
  for(const r of KENT.rubrics){
    if(r.ch!==ch) continue;
    const mEN=r.path.split(', ')[0];
    const cur=map.get(mEN);
    if(cur){ cur.n++; } else map.set(mEN,{en:mEN, pl:r.pathPL.split(', ')[0], n:1});
  }
  return [...map.values()].sort((a,b)=>a.pl.localeCompare(b.pl,'pl'));
}
function variantsOf(ch,mainEN){ return KENT.rubrics.filter(r=>r.ch===ch && r.path.split(', ')[0]===mainEN); }

function renderGChap(){
  const chs=chapterCounts();
  view.innerHTML=`<div class="screen">
    <div class="prog-wrap"><div class="prog"><i style="width:33%"></i></div><div class="prog-lbl">Krok 1 z 3 · wybierz obszar ciała / sferę</div></div>
    <h2 class="q-title" style="margin-top:18px">Czego dotyczy dolegliwość?</h2>
    <div class="list" style="margin-top:16px">${chs.map(c=>`<div class="row" role="button" tabindex="0" data-gchap="${esc(c.ch)}">
      <div class="ico">${svg('book')}</div><div class="tx"><b>${esc(c.pl)}</b><span>${esc(c.ch)}</span></div>
      <span class="cnt">${c.n}</span>${chevR}</div>`).join('')}</div>
    ${caseBar()}
  </div>`;
  view.querySelectorAll('[data-gchap]').forEach(el=>el.onclick=()=>{ state.gchap=el.dataset.gchap; state.gmquery=""; state.screen='gmain'; render(); window.scrollTo(0,0); });
  bindCaseBar();
}

function renderGMain(){
  const q=state.gmquery.trim().toLowerCase();
  let mains=mainRubricsOf(state.gchap);
  if(q) mains=mains.filter(m=>m.pl.toLowerCase().includes(q)||m.en.toLowerCase().includes(q));
  const shown=mains.slice(0,400);
  const rows=shown.map(m=>`<div class="row" role="button" tabindex="0" data-gmain="${esc(m.en)}">
    <div class="tx"><b>${esc(m.pl)}</b>${m.en!==m.pl?`<span>${esc(m.en)}</span>`:''}</div>
    <span class="cnt">${m.n}</span>${chevR}</div>`).join('');
  view.innerHTML=`<div class="screen">
    <div class="prog-wrap"><div class="prog"><i style="width:66%"></i></div><div class="prog-lbl">Krok 2 z 3 · ${esc(CH_PL[state.gchap]||state.gchap)} — wybierz objaw główny</div></div>
    <div class="search" style="margin-top:14px"><svg viewBox="0 0 18 18" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.6"/><path d="M12.5 12.5L16 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input id="gm" type="search" enterkeyhint="search" placeholder="Szukaj objawu (np. ból, lęk, kaszel)…" value="${esc(state.gmquery)}" autocomplete="off" autocapitalize="off"></div>
    <div class="grouphdr">Objawy główne<span class="more">${mains.length}${mains.length>400?' · pokazano 400':''}</span></div>
    ${rows?`<div class="list">${rows}</div>`:`<div class="empty">Brak objawów dla „${esc(state.gmquery)}”.</div>`}
    ${caseBar()}
  </div>`;
  const gm=document.getElementById('gm');
  gm.addEventListener('input',e=>{ state.gmquery=e.target.value; clearTimeout(gm._t); gm._t=setTimeout(()=>{renderGMain();caretEnd(document.getElementById('gm'));},120); });
  view.querySelectorAll('[data-gmain]').forEach(el=>el.onclick=()=>{
    state.gmain=el.dataset.gmain;
    const v=variantsOf(state.gchap,state.gmain);
    state.gmainPL=(v[0]&&v[0].pathPL.split(', ')[0])||state.gmain;
    state.gvLimit=400; state.screen='gvars'; render(); window.scrollTo(0,0);
  });
  bindCaseBar();
}

function renderGVars(){
  const all=variantsOf(state.gchap,state.gmain);
  const shown=all.slice(0,state.gvLimit);
  const more=all.length>shown.length;
  const multi=all.length>1;
  view.innerHTML=`<div class="screen">
    <div class="prog-wrap"><div class="prog"><i style="width:100%"></i></div><div class="prog-lbl">Krok 3 z 3 · zaznacz pasujące objawy</div></div>
    <h2 class="q-title" style="margin-top:14px">${esc(state.gmainPL)}</h2>
    <div class="q-hint">${multi?'Dotknij wszystkich wariantów/modalności, które pasują. Dodają się do koszyka.':'Dotknij, aby dodać ten objaw do koszyka.'}</div>
    <div class="list" style="margin-top:14px">${shown.map(rubricRow).join('')}</div>
    ${more?`<div class="grouphdr"><span></span><span class="more" id="moreBtn">Pokaż więcej (${all.length-shown.length})</span></div>`:''}
    <div class="actions"><button class="btn btn-ghost" id="another">+ Inny objaw</button><button class="btn btn-primary" id="toAnalyze" ${caseSet.size?'':'disabled'}>Analizuj (${caseSet.size})</button></div>
  </div>`;
  bindRubricRows();
  const mb=document.getElementById('moreBtn'); if(mb) mb.onclick=()=>{state.gvLimit+=400;render();};
  document.getElementById('another').onclick=()=>{ state.screen='gchap'; render(); window.scrollTo(0,0); };
  document.getElementById('toAnalyze').onclick=()=>{ if(caseSet.size){ state.screen='rresult'; render(); window.scrollTo(0,0);} };
}

function openCase(){
  const items=[...caseSet].map(id=>KENT.rubrics.find(r=>r.id===id)).filter(Boolean);
  const list=items.map(r=>`<div class="ci"><span class="dot" style="background:var(--accent)"></span>
     <div style="flex:1;min-width:0"><div style="font-size:14.5px">${esc(r.pathPL)}</div><div style="font-size:12px;color:var(--label3)">${esc(KENT.demo?r.pl:(r.path!==r.pathPL?r.path:r.pl))}</div></div>
     <button data-del="${r.id}" style="border:0;background:none;color:#c0392b;font-size:13px;cursor:pointer;flex:none">Usuń</button></div>`).join('');
  openSheet(`<h3>Koszyk objawów</h3><div class="lat">${items.length} rubryk wybranych do analizy</div>
    <div class="cov">${list||'<div class="ci">Koszyk jest pusty.</div>'}</div>
    <button class="btn btn-primary" style="width:100%;margin-top:16px" id="analyze" ${items.length?'':'disabled'}>Repertoryzuj (${items.length})</button>
    <button class="close" id="clearCase">Wyczyść koszyk</button>`);
  sheetbody.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{caseSet.delete(b.dataset.del);persistCase();openCase();refreshCaseBar();});
  const an=document.getElementById('analyze'); if(an) an.onclick=()=>{closeSheet(); state.screen='rresult'; render(); window.scrollTo(0,0);};
  document.getElementById('clearCase').onclick=()=>{ caseSet.clear(); persistCase(); closeSheet(); render(); };
}

/* ---------- WIZARD flow ---------- */
function topicById(id){return TOPICS.find(t=>t.id===id);}
function startTopic(id){ state.topic=topicById(id); state.screen='wflow'; state.idx=0; state.picks={}; render(); window.scrollTo(0,0); }
function selectedWizardRubrics(){
  const s=new Set(); if(state.topic) s.add(state.topic.base);
  Object.values(state.picks).forEach(set=>set.forEach(r=>s.add(r)));
  return [...s];
}
function togglePick(qid,rub){ if(!state.picks[qid])state.picks[qid]=new Set(); const set=state.picks[qid]; set.has(rub)?set.delete(rub):set.add(rub); render(); }

function renderFlow(){
  const t=state.topic, qs=t.qs, total=qs.length, qid=qs[state.idx], q=Q[qid];
  const picked=state.picks[qid]||new Set(), last=state.idx===total-1;
  const chips=q[2].map(([label,rub])=>{ const on=picked.has(rub);
    return `<button class="chip ${on?'on':''}" data-rub="${rub}" data-q="${qid}"><span class="tick">${tickSvg}</span><span>${esc(label)}</span></button>`;}).join('');
  view.innerHTML=`<div class="screen">
    <div class="prog-wrap"><div class="prog"><i style="width:${Math.round((state.idx+1)/total*100)}%"></i></div><div class="prog-lbl">Pytanie ${state.idx+1} z ${total}</div></div>
    <div class="q-eyebrow">${esc(t.pl)}</div><h2 class="q-title">${esc(q[0])}</h2>${q[1]?`<div class="q-hint">${esc(q[1])}</div>`:''}
    <div class="chips">${chips}</div>
    <div class="actions">${state.idx>0?`<button class="btn btn-ghost" id="back">Wstecz</button>`:''}<button class="btn btn-primary" id="next">${last?'Pokaż leki':(picked.size?'Dalej':'Pomiń')}</button></div>
  </div>`;
  view.querySelectorAll('.chip').forEach(c=>c.onclick=()=>togglePick(c.dataset.q,c.dataset.rub));
  const back=document.getElementById('back'); if(back)back.onclick=()=>{state.idx--;render();};
  document.getElementById('next').onclick=()=>{ if(last){state.screen='wresult';selOpen=false;render();window.scrollTo(0,0);} else {state.idx++;render();window.scrollTo(0,0);} };
}

function renderWizardResult(){
  const rubrics=selectedWizardRubrics().map(id=>{ const r=RUB[id]; const rem={}; for(const k in r[2])rem[k.toLowerCase()]=r[2][k]; return {label:r[0],en:r[1],rem}; });
  renderResults({title:"Najlepiej dopasowane leki", sub:"Repertoryzacja na podstawie odpowiedzi w kreatorze.", rubrics, backScreen:'wizard'});
}
function renderRepResult(){
  const rubrics=[...caseSet].map(id=>KENT.rubrics.find(r=>r.id===id)).filter(Boolean).map(r=>({label:r.pathPL,en:(KENT.demo?r.pl:(r.path!==r.pathPL?r.path:r.pl)),rem:r.rem}));
  renderResults({title:"Analiza repertoryzacyjna", sub:"Leki uszeregowane wg liczby pokrytych rubryk i sumy stopni Kenta.", rubrics, backScreen:'rep'});
}

/* ---------- SHARED results renderer ---------- */
function renderResults(opt){
  const rubrics=opt.rubrics;
  const ranked=repertorize(rubrics).filter(r=>r.count>0);
  const top=ranked.slice(0,10);
  const maxScore=top.length?top[0].score:1;
  const cards=top.map((r,i)=>{ const pct=Math.max(14,Math.round(r.score/maxScore*100));
    return `<div class="rmd" role="button" tabindex="0" data-rem="${esc(r.rem)}">
      <div class="rank">${i+1}</div>
      <div class="ring" style="background:conic-gradient(var(--accent) ${pct}%, rgba(60,60,67,.12) 0)"><span>${pct}%</span></div>
      <div class="info"><b>${esc(remName(r.rem))}</b><div class="lat">${esc(r.rem)}.</div>
      <div class="meta">Pokrywa <strong>${r.count}</strong> z ${rubrics.length} objawów · suma ${r.score}</div></div>${chevR}</div>`;}).join('');
  const selItems=rubrics.map(r=>`<div class="sel-item">${esc(r.label)}<em>${esc(r.en||'')}</em></div>`).join('');
  view.innerHTML=`<div class="screen">
    <div class="res-head"><h2>${esc(opt.title)}</h2><p>${esc(opt.sub)}</p></div>
    <div class="sel-bar ${selOpen?'open':''}" id="selbar"><div class="toggle" id="seltoggle">
      <svg viewBox="0 0 22 22" width="20" height="20" fill="none" style="color:var(--accent)"><path d="M4 6h14M4 11h14M4 16h9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <b>Wybrane objawy</b><span class="cnt">${rubrics.length} ${chevDown()}</span></div><div class="body">${selItems}</div></div>
    ${top.length?cards:`<div class="empty">Za mało danych. Wróć i dodaj więcej objawów.</div>`}
    <button class="btn btn-primary" style="width:100%;margin-top:6px" id="restart">${opt.backScreen==='rep'?'Wróć do repertorium':'Nowa analiza'}</button>
    <div class="foot">Wynik nie jest diagnozą ani zaleceniem leczenia. <a href="#" onclick="openDisclaimer();return false">Zastrzeżenie i bezpieczeństwo</a></div>
  </div>`;
  document.getElementById('seltoggle').onclick=()=>{selOpen=!selOpen;render();};
  document.getElementById('restart').onclick=()=>{ if(opt.backScreen==='rep'){state.screen='home';state.tab='rep';render();} else goHome('wizard'); window.scrollTo(0,0); };
  view.querySelectorAll('[data-rem]').forEach(el=>{ el.onclick=()=>openRemedy(el.dataset.rem,rubrics); el.onkeydown=e=>{if(e.key==='Enter'){openRemedy(el.dataset.rem,rubrics);}}; });
}
function chevDown(){return '<svg viewBox="0 0 12 8" width="11" height="8" style="margin-left:4px" fill="none"><path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';}

/* ---------- SHEETS ---------- */
const backdrop=document.getElementById('backdrop'), sheet=document.getElementById('sheet'), sheetbody=document.getElementById('sheetbody');
function openSheet(html){ sheetbody.innerHTML=html; backdrop.classList.add('show'); sheet.classList.add('show'); sheet.scrollTop=0; }
function closeSheet(){ backdrop.classList.remove('show'); sheet.classList.remove('show'); }
function openRemedy(rem,rubrics){
  const key=remKeynote(rem);
  const cov=rubrics.filter(r=>r.rem[rem]).map(r=>{ const g=r.rem[rem];
    return `<div class="ci"><span class="dot" style="background:${rgColor(g)}"></span>${esc(r.label)}<span class="gl">stopień ${g}</span></div>`;}).join('');
  openSheet(`<h3>${esc(remName(rem))}</h3><div class="lat">${esc(rem)}.</div>
    ${key?`<div class="key">${esc(key)}</div>`:''}
    <div class="sub">Pokrywa Twoje objawy</div><div class="cov">${cov||'<div class="ci">—</div>'}</div>
    <button class="close" onclick="closeSheet()">Zamknij</button>`);
}
function openDisclaimer(){
  openSheet(`<h3>Zastrzeżenie i bezpieczeństwo</h3><div class="lat">Przeczytaj, zanim skorzystasz z wyników</div>
    <div class="disc">
      <p>To narzędzie <strong>edukacyjne</strong>, oparte na <strong>Repertorium Kenta</strong> (J.T. Kent, 1897) — historycznym dziele homeopatycznym w domenie publicznej.</p>
      <p>Wynik <strong>nie jest diagnozą</strong>, poradą medyczną ani zaleceniem leczenia. Homeopatia nie ma potwierdzonej naukowo skuteczności wykraczającej poza efekt placebo i <strong>nie zastępuje</strong> leczenia o udowodnionym działaniu.</p>
      <div class="warn">Przy objawach nasilonych, nietypowych, długotrwałych lub niepokojących skontaktuj się z lekarzem. W stanach nagłych dzwoń pod numer alarmowy <strong>112</strong>.</div>
      <p style="color:var(--label3);font-size:13px">Tryb „Repertorium” wczytuje dane z pliku kent-repertory.json (generowanego skryptem build_kent.py). Wierność oryginałowi zależy od poprawnego pobrania i parsowania źródła.</p>
    </div><button class="close" onclick="closeSheet()">Rozumiem</button>`);
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeSheet(); });

/* ---------- START ---------- */
view.innerHTML='<div class="screen"><div class="hero"><h1>Repertorium</h1><p>Ładowanie bazy…</p></div></div>';
loadKent().then(()=>render());
</script>
</body>
</html>
