<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  :root{
    --bg:#edefea; --canvas:#dfe2da; --card:#ffffff;
    --label:#1c1c1e; --label2:#6b6b73; --label3:#a3a3ab;
    --sep:rgba(60,60,67,.10); --sep2:rgba(60,60,67,.18);
    --accent:#1f8a60; --accent-press:#176f4d; --accent-tint:rgba(31,138,96,.12);
    --g3:#1f8a60; --g2:#5fae8b; --g1:#a9cdba;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(20,40,30,.06);
    --radius:18px; --safe-b:env(safe-area-inset-bottom,0px);
    --ff:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:var(--ff);background:var(--canvas);color:var(--label);-webkit-font-smoothing:antialiased;line-height:1.42;font-size:17px}
  #app{max-width:480px;margin:0 auto;min-height:100dvh;min-height:100vh;background:var(--bg);position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.10)}
  @media (max-width:520px){ #app{box-shadow:none} body{background:var(--bg)} }

  /* ——— WERSJA KOMPUTEROWA: pełnoekranowa, nowoczesna strona w stylu cinematic ——— */
  @media (min-width:768px) and (min-height:600px){
    html,body{height:auto}
    body{min-height:100vh;background:var(--bg);position:relative;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(70% 50% at 80% -8%, rgba(52,201,138,.13), transparent 60%),
        radial-gradient(60% 45% at 6% 6%, rgba(31,138,96,.10), transparent 60%);}
    #app{max-width:none;width:100%;margin:0;min-height:100vh;background:transparent;overflow:visible;box-shadow:none;position:relative;z-index:1}

    .nav{height:62px;border-bottom:.5px solid var(--sep);
      padding-left:max(24px,calc((100% - 1180px)/2));padding-right:max(24px,calc((100% - 1180px)/2))}
    .nav .title{font-size:18px}

    .screen{max-width:1180px;margin:0 auto;padding:0 24px calc(72px + var(--safe-b))}

    .hero{position:relative;text-align:center;padding:66px 8px 28px}
    .hero::before{content:"";position:absolute;left:50%;top:-30px;transform:translateX(-50%);
      width:820px;max-width:92%;height:340px;z-index:-1;pointer-events:none;filter:blur(10px);
      background:radial-gradient(circle, rgba(52,201,138,.20), transparent 68%)}
    .hero h1{font-size:clamp(44px,5.4vw,72px);line-height:1.04;letter-spacing:-1.6px;margin:0 0 16px;
      background:linear-gradient(135deg,var(--label) 28%,var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
    .hero p{font-size:clamp(16px,1.5vw,20px);max-width:640px;margin:0 auto;color:var(--label2)}

    .search{max-width:660px;margin:12px auto 6px}

    .grouphdr{max-width:1180px;font-size:14px;margin:30px 2px 14px}
    .alpha{font-size:14px;padding:18px 2px 8px}

    .list{background:transparent;box-shadow:none;border-radius:0;overflow:visible;
      display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:13px}
    .row{border-bottom:0;background:var(--card);border:1px solid var(--sep);border-radius:16px;
      box-shadow:var(--shadow);padding:16px;transition:transform .14s,box-shadow .14s,border-color .14s}
    .row:hover{transform:translateY(-3px);box-shadow:0 14px 34px -14px rgba(0,0,0,.4);border-color:var(--accent)}
    .row .chev{display:none}
    .rrow{border-bottom:0;background:var(--card);border:1px solid var(--sep);border-radius:14px;
      box-shadow:var(--shadow);padding:14px;transition:transform .12s,border-color .12s,box-shadow .12s}
    .rrow:hover{transform:translateY(-2px);box-shadow:0 12px 30px -14px rgba(0,0,0,.36)}
    .rrow.on{border-color:var(--accent)}

    .prog-wrap,.q-eyebrow,.q-title,.q-hint{max-width:860px;margin-left:auto;margin-right:auto}
    .q-eyebrow{text-align:center;margin-top:42px}
    .q-title{text-align:center;font-size:clamp(28px,3vw,40px)}
    .q-hint{text-align:center}
    .chips{max-width:920px;margin:26px auto 8px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:13px}
    .chip:hover{border-color:var(--accent)}
    .actions{position:sticky;bottom:0;left:auto;right:auto;max-width:860px;margin:18px auto 0;
      padding:16px 0 calc(20px + var(--safe-b));background:linear-gradient(to top,var(--bg) 72%,transparent)}

    .res-head{max-width:1180px;text-align:center;padding-top:38px}
    .res-head h2{font-size:clamp(26px,3vw,38px)}
    .rmd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:13px}
    .rmd{margin-bottom:0;border:1px solid var(--sep);transition:transform .12s,box-shadow .12s}
    .rmd:hover{transform:translateY(-3px);box-shadow:0 14px 34px -14px rgba(0,0,0,.4)}
    .sel-bar,.banner{max-width:1180px}

    @media (prefers-reduced-motion:reduce){ .row,.rrow,.rmd{transition:none} }
  }

  .nav{position:sticky;top:0;z-index:30;height:52px;display:flex;align-items:center;padding:0 8px;background:rgba(237,239,234,.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid var(--sep)}
  .nav .title{flex:1;text-align:center;font-size:17px;font-weight:600;letter-spacing:.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px}
  .nav button{border:0;background:none;color:var(--accent);font-family:var(--ff);font-size:17px;padding:8px 10px;min-width:60px;cursor:pointer;display:flex;align-items:center;gap:2px}
  .nav button:active{opacity:.5}
  .nav .right{justify-content:flex-end}
  .nav .icnbtn{min-width:44px;justify-content:center}
  .chev-l{width:11px;height:18px}

  .screen{padding:0 16px calc(28px + var(--safe-b));animation:fade .26s ease both}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @media (prefers-reduced-motion:reduce){ .screen{animation:none} *{transition:none!important} }

  .hero{padding:6px 4px 8px}
  .hero h1{font-size:34px;line-height:1.1;font-weight:700;letter-spacing:-.5px;margin:8px 0 6px}
  .hero p{margin:0;color:var(--label2);font-size:15px}

  /* segmented control */
  .seg{display:flex;background:rgba(118,118,128,.12);border-radius:11px;padding:2px;margin:16px 0 4px}
  .seg button{flex:1;border:0;background:none;font-family:var(--ff);font-size:14px;font-weight:600;color:var(--label);padding:8px;border-radius:9px;cursor:pointer;transition:.18s}
  .seg button.on{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.12)}

  .search{position:relative;margin:14px 0 8px}
  .search input{width:100%;border:0;background:rgba(118,118,128,.12);border-radius:12px;padding:11px 12px 11px 38px;font-size:17px;font-family:var(--ff);color:var(--label)}
  .search input::placeholder{color:#8a8a90}
  .search input:focus{outline:2px solid var(--accent-tint)}
  .search>svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:#8a8a90}

  .grouphdr{font-size:13px;font-weight:600;color:var(--label2);text-transform:uppercase;letter-spacing:.4px;margin:18px 4px 8px;display:flex;align-items:center;justify-content:space-between}
  .grouphdr .more{color:var(--accent);text-transform:none;letter-spacing:0;font-weight:500;cursor:pointer}

  .list{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .row{display:flex;align-items:center;gap:13px;padding:12px 14px;cursor:pointer;border-bottom:.5px solid var(--sep);transition:background .15s}
  .row:last-child{border-bottom:0}
  .row:active{background:rgba(60,60,67,.07)}
  .row .ico{width:34px;height:34px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--accent-tint);color:var(--accent)}
  .row .ico svg{width:20px;height:20px}
  .row .tx{flex:1;min-width:0}
  .row .tx b{font-weight:500;font-size:17px;display:block}
  .row .tx span{font-size:13px;color:var(--label3);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .cnt{font-size:13px;color:var(--label3);flex:none}
  .row .chev{width:8px;height:14px;color:var(--label3);flex:none}
  .empty{color:var(--label3);text-align:center;padding:34px 10px;font-size:15px}

  /* rubric rows (full repertory) */
  .rrow{display:flex;align-items:flex-start;gap:11px;padding:11px 14px;cursor:pointer;border-bottom:.5px solid var(--sep)}
  .rrow:last-child{border-bottom:0}
  .rrow:active{background:rgba(60,60,67,.06)}
  .rrow .add{width:24px;height:24px;border-radius:50%;border:2px solid var(--sep2);flex:none;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:.15s}
  .rrow .add svg{width:13px;height:13px;color:#fff;opacity:0;transform:scale(.5);transition:.15s}
  .rrow.on .add{background:var(--accent);border-color:var(--accent)}
  .rrow.on .add svg{opacity:1;transform:none}
  .rrow .rt{flex:1;min-width:0}
  .rrow .rt b{font-weight:500;font-size:15.5px;line-height:1.3;display:block}
  .rrow .rt span{font-size:12px;color:var(--label3)}
  .rrow .rn{font-size:12px;color:var(--label3);flex:none;margin-top:2px}

  /* questions / wizard */
  .prog-wrap{padding:14px 2px 4px}
  .prog{height:5px;border-radius:3px;background:rgba(60,60,67,.12);overflow:hidden}
  .prog>i{display:block;height:100%;background:var(--accent);border-radius:3px;transition:width .35s cubic-bezier(.4,0,.2,1)}
  .prog-lbl{font-size:13px;color:var(--label3);margin:8px 2px 0}
  .q-eyebrow{font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.3px;margin:22px 2px 6px;text-transform:uppercase}
  .q-title{font-size:26px;font-weight:700;letter-spacing:-.3px;line-height:1.18;margin:0 2px 4px}
  .q-hint{font-size:14px;color:var(--label2);margin:4px 2px 0}
  .chips{display:flex;flex-direction:column;gap:10px;margin:20px 0 8px}
  .chip{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--card);border:1.5px solid transparent;border-radius:14px;padding:14px 15px;font-size:16px;font-family:var(--ff);color:var(--label);box-shadow:var(--shadow);cursor:pointer;transition:transform .08s,border-color .15s,background .15s}
  .chip:active{transform:scale(.985)}
  .chip .tick{width:23px;height:23px;border-radius:50%;border:2px solid var(--sep2);flex:none;display:flex;align-items:center;justify-content:center;transition:.15s}
  .chip .tick svg{width:13px;height:13px;color:#fff;opacity:0;transform:scale(.5);transition:.15s}
  .chip.on{border-color:var(--accent);background:var(--accent-tint)}
  .chip.on .tick{background:var(--accent);border-color:var(--accent)}
  .chip.on .tick svg{opacity:1;transform:none}

  .actions{position:sticky;bottom:0;left:0;right:0;margin:8px -16px 0;padding:12px 16px calc(14px + var(--safe-b));background:linear-gradient(to top,var(--bg) 70%,transparent);display:flex;gap:10px}
  .btn{flex:1;border:0;border-radius:14px;padding:15px;font-size:17px;font-weight:600;font-family:var(--ff);cursor:pointer;transition:transform .08s,opacity .15s}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:active{background:var(--accent-press)}
  .btn-primary:disabled{opacity:.4}
  .btn-ghost{background:rgba(118,118,128,.12);color:var(--accent);flex:0 0 auto;padding-left:22px;padding-right:22px}

  /* sticky case button */
  .casebar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:480px;margin:0;padding:10px 16px calc(14px + var(--safe-b));background:linear-gradient(to top,var(--bg) 80%,rgba(0,0,0,0));z-index:60}
  body.has-case .screen{padding-bottom:92px}
  .casebar button{width:100%;border:0;border-radius:14px;padding:15px;font-size:17px;font-weight:600;font-family:var(--ff);background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .casebar button:active{background:var(--accent-press)}
  .casebar .b{background:rgba(255,255,255,.25);border-radius:20px;padding:1px 9px;font-size:14px}

  /* results */
  .res-head{padding:8px 2px 2px}
  .res-head h2{font-size:24px;font-weight:700;letter-spacing:-.3px;margin:6px 0 2px}
  .res-head p{margin:0;color:var(--label2);font-size:14px}
  .sel-bar{margin:14px 0;background:var(--card);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .sel-bar .toggle{display:flex;align-items:center;gap:10px;padding:13px 15px;cursor:pointer;font-size:15px}
  .sel-bar .toggle b{font-weight:500}
  .sel-bar .toggle .cnt{margin-left:auto;color:var(--label3);font-size:14px}
  .sel-bar .body{display:none;padding:0 15px 12px;border-top:.5px solid var(--sep)}
  .sel-bar.open .body{display:block}
  .sel-item{font-size:14px;color:var(--label2);padding:8px 0;border-bottom:.5px solid var(--sep);display:flex;gap:8px}
  .sel-item:last-child{border:0}
  .sel-item em{color:var(--label3);font-style:normal;margin-left:auto;white-space:nowrap}
  .rmd{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:13px 14px;margin-bottom:11px;cursor:pointer;transition:transform .08s}
  .rmd:active{transform:scale(.99)}
  .rank{font-size:13px;font-weight:700;color:var(--label3);width:18px;text-align:center;flex:none}
  .ring{width:46px;height:46px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
  .ring::after{content:"";position:absolute;inset:5px;background:var(--card);border-radius:50%}
  .ring span{position:relative;z-index:1;font-size:13px;font-weight:700;color:var(--accent)}
  .rmd .info{flex:1;min-width:0}
  .rmd .info b{font-weight:600;font-size:17px}
  .rmd .info .lat{font-size:13px;color:var(--label3);font-style:italic}
  .rmd .info .meta{font-size:13px;color:var(--label2);margin-top:2px}
  .rmd .chev{width:8px;height:14px;color:var(--label3);flex:none}

  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.32);opacity:0;pointer-events:none;transition:opacity .3s;z-index:40}
  .backdrop.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;z-index:50;background:var(--bg);border-radius:22px 22px 0 0;padding:8px 18px calc(24px + var(--safe-b));transform:translateY(101%);transition:transform .34s cubic-bezier(.32,.72,0,1);max-height:88dvh;max-height:88vh;overflow:auto;box-shadow:0 -10px 40px rgba(0,0,0,.18)}
  .sheet.show{transform:none}
  .grab{width:38px;height:5px;border-radius:3px;background:var(--sep2);margin:6px auto 10px}
  .sheet h3{font-size:22px;font-weight:700;margin:6px 0 1px;letter-spacing:-.2px}
  .sheet .lat{color:var(--label3);font-style:italic;font-size:14px;margin-bottom:14px}
  .sheet .key{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:14px;font-size:15px;color:var(--label);margin-bottom:16px}
  .sheet .sub{font-size:13px;font-weight:600;color:var(--label2);text-transform:uppercase;letter-spacing:.4px;margin:0 2px 8px}
  .cov{background:var(--card);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .cov .ci{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:.5px solid var(--sep);font-size:15px}
  .cov .ci:last-child{border:0}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .cov .ci .gl{margin-left:auto;font-size:12px;color:var(--label3)}
  .sheet .close{width:100%;margin-top:18px;background:rgba(118,118,128,.12);color:var(--accent);border:0;border-radius:14px;padding:15px;font-size:17px;font-weight:600;font-family:var(--ff);cursor:pointer}
  .sheet .danger{color:#c0392b}

  .disc{font-size:14px;color:var(--label2);line-height:1.5}
  .disc strong{color:var(--label)}
  .disc .warn{background:#fff5ec;border:1px solid #ffd9b3;color:#8a4b00;border-radius:12px;padding:12px 14px;margin:10px 0;font-size:13.5px}

  .banner{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:11px 13px;font-size:13px;color:var(--label2);margin:6px 0 2px;display:flex;gap:9px;align-items:flex-start}
  .banner svg{flex:none;width:17px;height:17px;color:var(--accent);margin-top:1px}
  .banner.demo{background:#fff8ee}
  .banner.demo svg{color:#c08a2a}

  .foot{margin-top:24px;text-align:center;color:var(--label3);font-size:12px;line-height:1.5}
  .foot a{color:var(--accent);text-decoration:none}

  .alpha{font-size:13px;font-weight:800;color:var(--accent);letter-spacing:.08em;padding:14px 4px 6px}
  .alpha:first-child{padding-top:2px}

  /* tryb ciemny — grafit */
  body.dark{
    --bg:#16181c; --canvas:#0d0e10; --card:#1e2227;
    --label:#f3f4f6; --label2:#aab0b8; --label3:#71777f;
    --sep:rgba(255,255,255,.08); --sep2:rgba(255,255,255,.17);
    --accent:#34c98a; --accent-press:#2bb079; --accent-tint:rgba(52,201,138,.16);
    --g3:#34c98a; --g2:#5fae8b; --g1:#41544a;
    --shadow:0 1px 2px rgba(0,0,0,.5),0 10px 30px rgba(0,0,0,.55);
  }
  body.dark .nav{background:rgba(22,24,28,.82)}
  body.dark .seg{background:rgba(255,255,255,.07)}
  body.dark .seg button.on{background:#2a2f37}
  body.dark .search input{background:rgba(255,255,255,.07)}
  body.dark .ring{background:#2a2f37}
  body.dark .banner.demo{background:#2a2410}
  body.dark .disc .warn{background:#2a1f10;border-color:#5a4520;color:#f0c890}
</style>
</head>

<script>
"use strict";

/* =====================================================================

const REM = {
  Acon:["Aconitum napellus","Tojad mocny","Nagły, gwałtowny początek po zimnym suchym wietrze lub silnym przestrachu. Niepokój, lęk, pragnienie zimnej wody."],
  Apis:["Apis mellifica","Pszczoła miodna","Różowy, piekąco-kłujący obrzęk; lepiej od zimna, gorzej od ciepła. Zwykle bez pragnienia."],

const PL_PHRASE_RE = (()=>{

function plSegment(seg){
  let s = (seg||"").trim();
  if(!s) return s;
  s = s.replace(/\(agg\.?\)/ig,'(pog.)').replace(/\(amel\.?\)/ig,'(popr.)')
       .replace(/\(see\s+([^)]+)\)/ig,(m,x)=>'(zob. '+x+')');
  const low = s.toLowerCase();
  if(PL_PHRASES[low]) return PL_PHRASES[low];
  if(PL_PHRASE_RE) s = s.replace(PL_PHRASE_RE, m=>PL_PHRASES[m.toLowerCase()]||m);
  return s.replace(/[A-Za-zÀ-ÿ][A-Za-zÀ-ÿ.'’-]*/g, w=>{
    const t = PL_WORDS[w.toLowerCase()];
    return (t!==undefined) ? t : w;
  });
}
const CH_PL_LOWER = (()=>{ const m={}; for(const k in CH_PL) m[k.toLowerCase()]=CH_PL[k]; return m; })();
function translateRubric(path){
  if(!path) return path;
  const segs = path.split(', ');
  let r = segs.map((seg,i)=>{
    if(i===0){ const c=CH_PL_LOWER[(seg||'').trim().toLowerCase()]; if(c) return c; }
    return plSegment(seg);
  }).join(', ');
  r = r.replace(/\s+/g,' ').replace(/\s+([,;:.])/g,'$1').replace(/,\s*,/g,',').replace(/^[\s,]+/,'').replace(/[\s,]+$/,'').trim();
  return r.charAt(0).toUpperCase() + r.slice(1);
}

    /^(stomach|nausea|overeat|bloating|cramp|worse_eating|better_eating)/.test(id) ? "Stomach" :

    /^(sleep|sleepy)/.test(id) ? "Sleep" :
    /^(anx|mood|grief|worse_consol|better_consol)/.test(id) ? "Mind" :
    /^pain/.test(id) ? "Extremities" :
    /^skin/.test(id) ? "Skin" :
    /^menses/.test(id) ? "Genitalia female" :
    "Generalities";
  const rubrics = Object.entries(RUB).map(([id,r])=>{
    const rem = {}; for (const k in r[2]) rem[k.toLowerCase()] = r[2][k];
    return {ch:chOf(id), p:r[0], en:r[1], r:rem};
  });
  const order = [];
  rubrics.forEach(x=>{ if(!order.includes(x.ch)) order.push(x.ch); });
  return {chapters:order, remedies, rubrics, demo:true};
}

function normalizeKent(raw){
  // raw.rubrics items use short keys c/p/r (z buildera) lub ch/p/en/r (demo)
  const demo = !!raw.demo;
  const rubrics = raw.rubrics.map((x,i)=>{
    const path = x.p;
    return {
      id:"k"+i,
      ch:x.c || x.ch,
      pl:CH_PL[x.c || x.ch] || (x.c || x.ch),
      path,
      pathPL: demo ? path : translateRubric(path),   // demo ma już polskie etykiety
      en:x.en || "",
      rem:x.r
    };
  });
  KENT = {chapters:raw.chapters, remedies:raw.remedies, rubrics, demo:demo, meta:raw.meta};
  KENT_INDEX = rubrics.map(r=>({id:r.id, hay:(r.pathPL+" "+r.path+" "+(r.en||"")).toLowerCase(), ref:r}));
}

async function loadKent(){
  // 1) dane WBUDOWANE w ten plik (tryb „wszystko w jednym") — działa nawet po
  //    otwarciu pliku podwójnym kliknięciem, bez serwera.
  const tag=document.getElementById('kent-data');
  if(tag){
    const txt=tag.textContent.trim();
    if(txt.length>20){
      try{ const data=JSON.parse(txt); if(data&&data.rubrics&&data.rubrics.length){ normalizeKent(data); return; } }catch(e){}
    }
  }
  // 2) zewnętrzny plik kent-repertory.json obok index.html (serwer / GitHub Pages)
  try{
    const res = await fetch("kent-repertory.json", {cache:"no-store"});
    if(res.ok){
      const data = await res.json();
      if(data && data.rubrics && data.rubrics.length){ normalizeKent(data); return; }
    }
  }catch(e){/* brak pliku — użyj demo */}
  // 3) baza demonstracyjna
  normalizeKent(buildDemoKent());
}

function rubricsByChapter(ch){ return KENT.rubrics.filter(r=>r.ch===ch); }
function chapterCounts(){
  const m = {}; KENT.rubrics.forEach(r=>{ m[r.ch]=(m[r.ch]||0)+1; });
  return KENT.chapters.filter(c=>m[c]).map(c=>({ch:c, pl:CH_PL[c]||c, n:m[c]}));
}

/* unified remedy helpers (lowercase keys) */
function remName(k){ return (KENT && KENT.remedies[k]) || (REM_LOWER[k] && REM_LOWER[k].name) || (k.charAt(0).toUpperCase()+k.slice(1)); }
function remKeynote(k){ return REM_LOWER[k] ? REM_LOWER[k].key : ""; }

/* =====================================================================
   ENGINE: repertoryzacja na liście rubryk {label,en,rem:{key:grade}}
   ===================================================================== */
function repertorize(rubrics){
  const sc = {};
  rubrics.forEach(r=>{
    for(const rem in r.rem){
      if(!sc[rem]) sc[rem]={score:0,count:0};
      sc[rem].score += r.rem[rem]; sc[rem].count++;
    }
  });
  return Object.entries(sc).map(([rem,v])=>({rem,...v}))
    .sort((a,b)=> b.count-a.count || b.score-a.score || a.rem.localeCompare(b.rem));
}
function rgColor(g){ return g===3?'var(--g3)':g===2?'var(--g2)':'var(--g1)'; }

/* ---------- WIZARD flow ---------- */
function topicById(id){return TOPICS.find(t=>t.id===id);}
function startTopic(id){ state.topic=topicById(id); state.kentExtra=kentRubricsForTopic(state.topic); state.screen='wflow'; state.idx=0; state.picks={}; render(); window.scrollTo(0,0); }
function kentRubricsForTopic(t){
  // Z pełnego repertorium Kenta wyciąga rubryki pasujące do dolegliwości.
  // Działa tylko z załadowanym pełnym kent-repertory.json (nie w trybie demo).
  if(!t||!KENT||!KENT.rubrics||!KENT.rubrics.length||KENT.demo) return [];
  const en=((RUB[t.base]&&RUB[t.base][1])||'').toLowerCase();
  const toks=en.split(/[\s,;]+/).map(w=>w.replace(/[^a-z-]/g,'')).filter(w=>w.length>2 && !['the','and','with','from','for'].includes(w));
  if(!toks.length) return [];
  const chap=toks[0], rest=toks.slice(1);
  const out=[];
  for(const r of KENT.rubrics){
    const hay=(r.path+' '+(r.en||'')).toLowerCase();
    if(hay.indexOf(chap)<0) continue;
    let sc=0; for(const w of rest) if(hay.indexOf(w)>=0) sc++;
    out.push([sc,r]);
  }
  out.sort((a,b)=> b[0]-a[0] || a[1].path.length-b[1].path.length);
  const seen=new Set(), res=[];
  for(const pr of out){ const r=pr[1]; if(seen.has(r.pathPL))continue; seen.add(r.pathPL); res.push(r); if(res.length>=60)break; }
  return res;
}
function selectedWizardRubrics(){
  const s=new Set(); if(state.topic) s.add(state.topic.base);
  Object.values(state.picks).forEach(set=>set.forEach(r=>s.add(r)));
  return [...s];
}
function togglePick(qid,rub){ if(!state.picks[qid])state.picks[qid]=new Set(); const set=state.picks[qid]; set.has(rub)?set.delete(rub):set.add(rub); render(); }

function renderFlow(){
  const t=state.topic, qs=t.qs, extra=state.kentExtra||[];
  const total=qs.length+(extra.length?1:0);
  if(state.idx>=qs.length){
    const picked=state.picks['__kent']||new Set();
    const chips=extra.map(r=>{ const on=picked.has(r.id);
      return `<button class="chip ${on?'on':''}" data-rub="${r.id}" data-q="__kent"><span class="tick">${tickSvg}</span><span>${esc(r.pathPL)}</span></button>`;}).join('');
    view.innerHTML=`<div class="screen">
      <div class="prog-wrap"><div class="prog"><i style="width:100%"></i></div><div class="prog-lbl">Pytanie ${total} z ${total}</div></div>
      <div class="q-eyebrow">${esc(t.pl)}</div><h2 class="q-title">Dopasuj dokładniej — wg Kenta</h2>
      <div class="q-hint">${extra.length} rubryk z pełnego repertorium dla tej dolegliwości. Zaznacz pasujące (opcjonalnie), aby zawęzić wynik.</div>
      <div class="chips">${chips}</div>
      <div class="actions"><button class="btn btn-ghost" id="back">Wstecz</button><button class="btn btn-primary" id="next">Pokaż leki</button></div>
    </div>`;
    view.querySelectorAll('.chip').forEach(c=>c.onclick=()=>togglePick(c.dataset.q,c.dataset.rub));
    document.getElementById('back').onclick=()=>{state.idx--;render();};
    document.getElementById('next').onclick=()=>{state.screen='wresult';selOpen=false;render();window.scrollTo(0,0);};
    return;
  }
  const qid=qs[state.idx], q=Q[qid];
  const picked=state.picks[qid]||new Set(), last=state.idx===total-1;
  const chips=q[2].map(([label,rub])=>{ const on=picked.has(rub);
    return `<button class="chip ${on?'on':''}" data-rub="${rub}" data-q="${qid}"><span class="tick">${tickSvg}</span><span>${esc(label)}</span></button>`;}).join('');
  view.innerHTML=`<div class="screen">
    <div class="prog-wrap"><div class="prog"><i style="width:${Math.round((state.idx+1)/total*100)}%"></i></div><div class="prog-lbl">Pytanie ${state.idx+1} z ${total}</div></div>
    <div class="q-eyebrow">${esc(t.pl)}</div><h2 class="q-title">${esc(q[0])}</h2>${q[1]?`<div class="q-hint">${esc(q[1])}</div>`:''}
    <div class="chips">${chips}</div>
    <div class="actions">${state.idx>0?`<button class="btn btn-ghost" id="back">Wstecz</button>`:''}<button class="btn btn-primary" id="next">${last?'Pokaż leki':(picked.size?'Dalej':'Pomiń')}</button></div>
  </div>`;
  view.querySelectorAll('.chip').forEach(c=>c.onclick=()=>togglePick(c.dataset.q,c.dataset.rub));
  const back=document.getElementById('back'); if(back)back.onclick=()=>{state.idx--;render();};
  document.getElementById('next').onclick=()=>{ if(last){state.screen='wresult';selOpen=false;render();window.scrollTo(0,0);} else {state.idx++;render();window.scrollTo(0,0);} };
}

function renderWizardResult(){
  const lc=o=>{const m={};for(const k in o)m[k.toLowerCase()]=o[k];return m;};
  const out=[], seen=new Set();
  const add=(label,en,rem)=>{ if(seen.has(label))return; seen.add(label); out.push({label,en,rem}); };
  if(state.topic){ const r=RUB[state.topic.base]; add(r[0],r[1],lc(r[2])); }
  for(const qid in state.picks){ const set=state.picks[qid];
    if(qid==='__kent'){ set.forEach(id=>{ const r=KENT.rubrics.find(x=>x.id===id); if(r) add(r.pathPL,(KENT.demo?r.pl:(r.path!==r.pathPL?r.path:r.pl)),r.rem); }); }
    else { set.forEach(id=>{ const r=RUB[id]; if(r) add(r[0],r[1],lc(r[2])); }); }
  }
  renderResults({title:"Najlepiej dopasowane leki", sub:"Repertoryzacja na podstawie odpowiedzi w kreatorze.", rubrics:out, backScreen:'wizard'});
}
function renderRepResult(){
  const rubrics=[...caseSet].map(id=>KENT.rubrics.find(r=>r.id===id)).filter(Boolean).map(r=>({label:r.pathPL,en:(KENT.demo?r.pl:(r.path!==r.pathPL?r.path:r.pl)),rem:r.rem}));
  renderResults({title:"Analiza repertoryzacyjna", sub:"Leki uszeregowane wg liczby pokrytych rubryk i sumy stopni Kenta.", rubrics, backScreen:'rep'});
}

/* ---------- SHARED results renderer ---------- */
function renderResults(opt){
  const rubrics=opt.rubrics;
  const ranked=repertorize(rubrics).filter(r=>r.count>0);
  const top=ranked.slice(0,10);
  const maxScore=top.length?top[0].score:1;
  const cards=top.map((r,i)=>{ const pct=Math.max(14,Math.round(r.score/maxScore*100));
    return `<div class="rmd" role="button" tabindex="0" data-rem="${esc(r.rem)}">
      <div class="rank">${i+1}</div>
      <div class="ring" style="background:conic-gradient(var(--accent) ${pct}%, rgba(60,60,67,.12) 0)"><span>${pct}%</span></div>
      <div class="info"><b>${esc(remName(r.rem))}</b><div class="lat">${esc(r.rem)}.</div>
      <div class="meta">Pokrywa <strong>${r.count}</strong> z ${rubrics.length} objawów · suma ${r.score}</div></div>${chevR}</div>`;}).join('');
  const selItems=rubrics.map(r=>`<div class="sel-item">${esc(r.label)}<em>${esc(r.en||'')}</em></div>`).join('');
  view.innerHTML=`<div class="screen">
    <div class="res-head"><h2>${esc(opt.title)}</h2><p>${esc(opt.sub)}</p></div>
    <div class="sel-bar ${selOpen?'open':''}" id="selbar"><div class="toggle" id="seltoggle">
      <svg viewBox="0 0 22 22" width="20" height="20" fill="none" style="color:var(--accent)"><path d="M4 6h14M4 11h14M4 16h9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <b>Wybrane objawy</b><span class="cnt">${rubrics.length} ${chevDown()}</span></div><div class="body">${selItems}</div></div>
    ${top.length?`<div class="rmd-grid">${cards}</div>`:`<div class="empty">Za mało danych. Wróć i dodaj więcej objawów.</div>`}
    <button class="btn btn-primary" style="width:100%;margin-top:6px" id="restart">${opt.backScreen==='rep'?'Wróć do repertorium':'Nowa analiza'}</button>
    <div class="foot">Wynik nie jest diagnozą ani zaleceniem leczenia. <a href="#" onclick="openDisclaimer();return false">Zastrzeżenie i bezpieczeństwo</a></div>
  </div>`;
  document.getElementById('seltoggle').onclick=()=>{selOpen=!selOpen;render();};
  document.getElementById('restart').onclick=()=>{ if(opt.backScreen==='rep'){state.screen='home';state.tab='rep';render();} else goHome('wizard'); window.scrollTo(0,0); };
  view.querySelectorAll('[data-rem]').forEach(el=>{ el.onclick=()=>openRemedy(el.dataset.rem,rubrics); el.onkeydown=e=>{if(e.key==='Enter'){openRemedy(el.dataset.rem,rubrics);}}; });
}
function chevDown(){return '<svg viewBox="0 0 12 8" width="11" height="8" style="margin-left:4px" fill="none"><path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';}

/* ---------- SHEETS ---------- */
const backdrop=document.getElementById('backdrop'), sheet=document.getElementById('sheet'), sheetbody=document.getElementById('sheetbody');
function openSheet(html){ sheetbody.innerHTML=html; backdrop.classList.add('show'); sheet.classList.add('show'); sheet.scrollTop=0; }
function closeSheet(){ backdrop.classList.remove('show'); sheet.classList.remove('show'); }
function openRemedy(rem,rubrics){
  const key=remKeynote(rem);
  const cov=rubrics.filter(r=>r.rem[rem]).map(r=>{ const g=r.rem[rem];
    return `<div class="ci"><span class="dot" style="background:${rgColor(g)}"></span>${esc(r.label)}<span class="gl">stopień ${g}</span></div>`;}).join('');
  openSheet(`<h3>${esc(remName(rem))}</h3><div class="lat">${esc(rem)}.</div>
    ${key?`<div class="key">${esc(key)}</div>`:''}
    <div class="sub">Pokrywa Twoje objawy</div><div class="cov">${cov||'<div class="ci">—</div>'}</div>
    <button class="close" onclick="closeSheet()">Zamknij</button>`);
}
function openDisclaimer(){
  openSheet(`<h3>Zastrzeżenie i bezpieczeństwo</h3><div class="lat">Przeczytaj, zanim skorzystasz z wyników</div>
    <div class="disc">
      <p>To narzędzie <strong>edukacyjne</strong>, oparte na <strong>Repertorium Kenta</strong> (J.T. Kent, 1897) — historycznym dziele homeopatycznym w domenie publicznej.</p>
      <p>Wynik <strong>nie jest diagnozą</strong>, poradą medyczną ani zaleceniem leczenia. Homeopatia nie ma potwierdzonej naukowo skuteczności wykraczającej poza efekt placebo i <strong>nie zastępuje</strong> leczenia o udowodnionym działaniu.</p>
      <div class="warn">Przy objawach nasilonych, nietypowych, długotrwałych lub niepokojących skontaktuj się z lekarzem. W stanach nagłych dzwoń pod numer alarmowy <strong>112</strong>.</div>
      <p style="color:var(--label3);font-size:13px">Tryb „Repertorium” wczytuje dane z pliku kent-repertory.json (generowanego skryptem build_kent.py). Wierność oryginałowi zależy od poprawnego pobrania i parsowania źródła.</p>
    </div><button class="close" onclick="closeSheet()">Rozumiem</button>`);
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeSheet(); });

/* ---------- MOTYW (jasny/ciemny grafit) ---------- */
function applyTheme(dark){
  document.body.classList.toggle('dark', !!dark);
  const m=document.querySelector('meta[name="theme-color"]'); if(m) m.setAttribute('content', dark?'#0d0e10':'#edefea');
}
function toggleTheme(){
  const dark=!document.body.classList.contains('dark');
  applyTheme(dark);
  try{ localStorage.setItem('kent_theme', dark?'dark':'light'); }catch(e){}
}
(function initTheme(){
  let pref=null; try{ pref=localStorage.getItem('kent_theme'); }catch(e){}
  if(pref===null && window.matchMedia) pref=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
  applyTheme(pref==='dark');
})();

/* ---------- START ---------- */
view.innerHTML='<div class="screen"><div class="hero"><h1>Repertorium</h1><p>Ładowanie bazy…</p></div></div>';
loadKent().then(()=>render());
</script>
