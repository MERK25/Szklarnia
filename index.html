<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Szklarnia Kontrola</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* [Użyj swoich dotychczasowych stylów CSS z poprzedniej wiadomości] */
    </style>
</head>
<body>
<div class="wrapper">
    <div class="tab-nav">
        <div id="btn-pulpit" class="tab-btn active" onclick="zmienZakladke('pulpit')">Pulpit</div>
        <div id="btn-serwis" class="tab-btn" onclick="zmienZakladke('serwis')">⚙️ Serwis</div>
    </div>
    
    <div class="tabs-wrapper">
        <div id="tab-pulpit" class="tab-content active">
            </div>
        <div id="tab-serwis" class="tab-content">
            </div>
    </div>
</div>

<script>
let profileData = {};

// Pobieranie bazy profili z ESP32
async function wczytajProfile() {
    try {
        const response = await fetch('http://192.168.4.1/get-profiles');
        const data = await response.json();
        profileData = Object.keys(data).length > 0 ? data : {
            'pomidory': { th: 40, time: 2, sleep: 4, name: 'Pomidory' },
            'ogorki': { th: 60, time: 1, sleep: 2, name: 'Ogórki' },
            'sadzonki': { th: 50, time: 0.5, sleep: 1, name: 'Sadzonki' },
            'arbuz': { th: 55, time: 3, sleep: 3, name: 'Arbuz' },
            'borowka': { th: 70, time: 1.5, sleep: 2, name: 'Borówka' }
        };
        wczytajProfilDoEdycji();
    } catch (e) {
        console.warn("Błąd pobierania profili z ESP");
    }
}

// Zapisywanie bazy do ESP32
async function zapiszEdytowanyProfil() {
    const id = document.getElementById('edit-profile-select').value;
    profileData[id].th = document.getElementById('edit-th').value;
    profileData[id].time = document.getElementById('edit-time').value;
    profileData[id].sleep = document.getElementById('edit-sleep').value;
    
    try {
        await fetch('http://192.168.4.1/save-profiles', {
            method: 'POST',
            body: JSON.stringify(profileData)
        });
        alert("✅ Zapisano w pamięci szklarni!");
    } catch(e) { alert("❌ Błąd zapisu"); }
}

function aktywujProfil(id) {
    const p = profileData[id];
    document.querySelectorAll('.profile-btn').forEach(btn => btn.classList.remove('selected'));
    document.getElementById('prof-' + id).classList.add('selected');
    
    // Wysyłamy komendę do podlewania
    fetch(`http://192.168.4.1/save?thPct=${p.th}&timeSec=${p.time * 60}&sleepSec=${p.sleep * 3600}`, { mode: 'no-cors' });
}

window.onload = function() {
    wczytajProfile();
    // ... reszta Twoich funkcji (renderujDane, pobierzDane, itd.)
}
</script>
</body>
</html>
